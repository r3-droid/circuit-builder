<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Circuit Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1A1B1D;
    --surface: #232527;
    --surface-raised: #2B2D30;
    --line: #38393C;
    --text: #F3F2EF;
    --text-dim: #9C9D9F;
    --work: #C6FF3D;
    --work-dim: #3A4318;
    --rest: #FF7A45;
    --rest-dim: #4A2A16;
    --danger: #FF5C5C;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .shell {
    max-width: 440px;
    margin: 0 auto;
    padding: 24px 18px 80px;
  }
  .eyebrow {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 4px;
  }
  h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0 0 18px;
    letter-spacing: -0.01em;
  }
  .name-input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 500;
    padding: 6px 0 10px;
    margin-bottom: 18px;
  }
  .name-input:focus { outline: none; border-bottom-color: var(--work); }

  .profile-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 14px;
  }
  .profile-select {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 10px 12px;
  }
  .profile-select:focus { outline: none; border-color: var(--work); }
  .profile-btn {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 10px 12px;
    line-height: 0;
    flex-shrink: 0;
  }
  .profile-btn:hover { color: var(--text); background: var(--surface-raised); }
  .profile-btn.remove:hover { color: var(--danger); }

  .summary-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .summary-card {
    flex: 1;
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    border: 1px solid var(--line);
  }
  .summary-card .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin: 0 0 4px;
  }
  .summary-card .value {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 600;
    margin: 0;
  }
  .summary-card.total .value { color: var(--work); }

  .config-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 22px;
  }
  .config-card {
    background: var(--surface);
    border-radius: 10px;
    padding: 10px 14px;
    border: 1px solid var(--line);
  }
  .config-card label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .config-card input {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 0;
  }
  .config-card input:focus { outline: none; }

  .section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 10px;
  }

  .station {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .station-num {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    color: var(--text-dim);
    width: 18px;
    flex-shrink: 0;
  }
  .station-main { flex: 1; min-width: 0; }
  .station-name {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    background: transparent;
    border: none;
    color: var(--text);
    width: 100%;
    padding: 0;
    font-family: 'Inter', sans-serif;
  }
  .station-name:focus { outline: none; }
  .station-times { display: flex; gap: 14px; align-items: center; }
  .time-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot.work { background: var(--work); }
  .dot.rest { background: var(--rest); }
  .time-pill input {
    width: 38px;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    padding: 0 0 2px;
  }
  .time-pill input:focus { outline: none; border-bottom-color: var(--work); }
  .station-actions {
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 3px;
    line-height: 0;
    border-radius: 5px;
  }
  .icon-btn:hover { color: var(--text); background: var(--surface-raised); }
  .icon-btn.remove:hover { color: var(--danger); }

  .add-row {
    display: flex;
    gap: 8px;
    margin: 14px 0 26px;
  }
  .add-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    padding: 11px 14px;
    font-family: 'Inter', sans-serif;
  }
  .add-row input:focus { outline: none; border-color: var(--work); }
  .add-row input::placeholder { color: var(--text-dim); }

  button.primary {
    background: var(--work);
    color: #18230A;
    border: none;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.02em;
    padding: 0 18px;
    cursor: pointer;
    white-space: nowrap;
  }
  button.primary:active { transform: scale(0.98); }

  .empty-state {
    text-align: center;
    padding: 30px 10px;
    color: var(--text-dim);
    font-size: 14px;
    border: 1px dashed var(--line);
    border-radius: 12px;
    margin-bottom: 14px;
  }

  /* Run mode */
  .run-launch {
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--line);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.03em;
    padding: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .run-launch svg { flex-shrink: 0; }

  .run-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .run-overlay.active { display: flex; }
  .run-phase-label {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin: 0 0 8px;
  }
  .run-phase-label.work { color: var(--work); }
  .run-phase-label.rest { color: var(--rest); }
  .run-exercise {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 600;
    margin: 0 0 28px;
    max-width: 320px;
  }
  .ring-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 28px; }
  .ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--surface); stroke-width: 10; }
  .ring-progress { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 0.95s linear; }
  .ring-progress.work { stroke: var(--work); }
  .ring-progress.rest { stroke: var(--rest); }
  .ring-time {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    font-size: 52px;
    font-weight: 600;
  }
  .run-meta { font-size: 13px; color: var(--text-dim); margin-bottom: 28px; }
  .run-controls { display: flex; gap: 10px; }
  .run-controls button {
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 22px;
    cursor: pointer;
  }
  .run-controls button.exit { color: var(--text-dim); }
</style>
</head>
<body>

<div class="shell">
  <p class="eyebrow">Circuit builder</p>
  <h1>Plan a station</h1>

  <div class="profile-row">
    <select class="profile-select" id="profileSelect"></select>
    <button class="profile-btn" id="newProfileBtn" aria-label="Add profile" title="Add profile">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <button class="profile-btn remove" id="deleteProfileBtn" aria-label="Delete profile" title="Delete profile">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <input class="name-input" id="circuitName" value="Lower body burn" />

  <div class="summary-row">
    <div class="summary-card">
      <p class="label">Stations</p>
      <p class="value" id="stationCount">0</p>
    </div>
    <div class="summary-card total">
      <p class="label">Total time</p>
      <p class="value" id="totalTime">0:00</p>
    </div>
  </div>

  <div class="config-row">
    <div class="config-card">
      <label for="rounds">Rounds</label>
      <input id="rounds" type="number" min="1" max="10" value="3">
    </div>
    <div class="config-card">
      <label for="roundRest">Rest between rounds (s)</label>
      <input id="roundRest" type="number" min="0" max="180" value="60">
    </div>
  </div>

  <p class="section-label">Stations</p>
  <div id="stationList"></div>
  <div id="emptyState" class="empty-state" style="display:none;">No stations yet. Add your first exercise below.</div>

  <div class="add-row">
    <input id="newStation" placeholder="Exercise name, e.g. Jump squats" />
    <button class="primary" id="addBtn">Add</button>
  </div>

  <button class="run-launch" id="runBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    Start circuit
  </button>
</div>

<div class="run-overlay" id="runOverlay">
  <p class="run-phase-label work" id="runPhaseLabel">Work</p>
  <p class="run-exercise" id="runExerciseName">Jump squats</p>
  <div class="ring-wrap">
    <svg viewBox="0 0 220 220">
      <circle class="ring-bg" cx="110" cy="110" r="100"></circle>
      <circle class="ring-progress work" id="ringProgress" cx="110" cy="110" r="100"></circle>
    </svg>
    <div class="ring-time" id="ringTime">40</div>
  </div>
  <p class="run-meta" id="runMeta">Round 1 of 3 · Station 1 of 4</p>
  <div class="run-controls">
    <button id="pauseBtn">Pause</button>
    <button id="muteBtn">🔊 Sound</button>
    <button class="exit" id="exitBtn">End circuit</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// ----- Profiles -----
const DEFAULT_STATIONS = [
  {id:1,name:'Jump squats',work:40,rest:20},
  {id:2,name:'Mountain climbers',work:40,rest:20},
  {id:3,name:'Lunges',work:40,rest:20},
  {id:4,name:'Plank hold',work:40,rest:20}
];

function loadProfiles(){
  return JSON.parse(localStorage.getItem('cb_profiles') || 'null') || [];
}
function saveProfiles(list){
  localStorage.setItem('cb_profiles', JSON.stringify(list));
}
function profileKey(profile, key){
  return `cb_${key}_${profile}`;
}

let profiles = loadProfiles();

// Migrate old single-user data into a "Default" profile the first time.
if (profiles.length === 0) {
  const oldStations = localStorage.getItem('cb_stations');
  const oldName = localStorage.getItem('cb_name');
  profiles = ['Default'];
  saveProfiles(profiles);
  localStorage.setItem(profileKey('Default','stations'), oldStations || JSON.stringify(DEFAULT_STATIONS));
  localStorage.setItem(profileKey('Default','name'), oldName || 'Lower body burn');
  localStorage.setItem('cb_active_profile', 'Default');
}

let activeProfile = localStorage.getItem('cb_active_profile') || profiles[0];
if (!profiles.includes(activeProfile)) activeProfile = profiles[0];

let stations = JSON.parse(localStorage.getItem(profileKey(activeProfile,'stations')) || 'null') || DEFAULT_STATIONS.slice();
let nextId = Math.max(0, ...stations.map(s=>s.id)) + 1;

function renderProfileSelect(){
  const sel = $('profileSelect');
  sel.innerHTML = profiles.map(p => `<option value="${p.replace(/"/g,'&quot;')}" ${p===activeProfile?'selected':''}>${p}</option>`).join('');
}

function switchProfile(name){
  saveActiveProfileData();
  activeProfile = name;
  localStorage.setItem('cb_active_profile', activeProfile);
  stations = JSON.parse(localStorage.getItem(profileKey(activeProfile,'stations')) || 'null') || DEFAULT_STATIONS.slice();
  nextId = Math.max(0, ...stations.map(s=>s.id), 0) + 1;
  const savedName = localStorage.getItem(profileKey(activeProfile,'name'));
  $('circuitName').value = savedName || 'New circuit';
  const savedRounds = localStorage.getItem(profileKey(activeProfile,'rounds'));
  const savedRoundRest = localStorage.getItem(profileKey(activeProfile,'roundRest'));
  $('rounds').value = savedRounds || 3;
  $('roundRest').value = savedRoundRest || 60;
  renderProfileSelect();
  render();
  recalc();
}

function saveActiveProfileData(){
  localStorage.setItem(profileKey(activeProfile,'stations'), JSON.stringify(stations));
  localStorage.setItem(profileKey(activeProfile,'name'), $('circuitName').value);
  localStorage.setItem(profileKey(activeProfile,'rounds'), $('rounds').value);
  localStorage.setItem(profileKey(activeProfile,'roundRest'), $('roundRest').value);
}

$('profileSelect').onchange = () => switchProfile($('profileSelect').value);

$('newProfileBtn').onclick = () => {
  const name = prompt('New profile name:');
  const trimmed = (name || '').trim();
  if (!trimmed) return;
  if (profiles.includes(trimmed)) { switchProfile(trimmed); return; }
  saveActiveProfileData();
  profiles.push(trimmed);
  saveProfiles(profiles);
  localStorage.setItem(profileKey(trimmed,'stations'), JSON.stringify(DEFAULT_STATIONS));
  localStorage.setItem(profileKey(trimmed,'name'), 'New circuit');
  switchProfile(trimmed);
};

$('deleteProfileBtn').onclick = () => {
  if (profiles.length <= 1) { alert('At least one profile must remain.'); return; }
  if (!confirm(`Delete profile "${activeProfile}" and all its circuits?`)) return;
  localStorage.removeItem(profileKey(activeProfile,'stations'));
  localStorage.removeItem(profileKey(activeProfile,'name'));
  localStorage.removeItem(profileKey(activeProfile,'rounds'));
  localStorage.removeItem(profileKey(activeProfile,'roundRest'));
  profiles = profiles.filter(p => p !== activeProfile);
  saveProfiles(profiles);
  switchProfile(profiles[0]);
};

function fmt(s){
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}

function save(){
  localStorage.setItem(profileKey(activeProfile,'stations'), JSON.stringify(stations));
}

function recalc(){
  const rounds = parseInt($('rounds').value) || 1;
  const roundRest = parseInt($('roundRest').value) || 0;
  const stationTime = stations.reduce((sum,s)=>sum + s.work + s.rest, 0);
  const total = stationTime * rounds + roundRest * Math.max(rounds - 1, 0);
  $('totalTime').textContent = fmt(total);
  $('stationCount').textContent = stations.length;
}

function render(){
  const list = $('stationList');
  list.innerHTML = '';
  $('emptyState').style.display = stations.length ? 'none' : 'block';

  stations.forEach((s, idx) => {
    const row = document.createElement('div');
    row.className = 'station';
    row.innerHTML = `
      <span class="station-num">${idx+1}</span>
      <div class="station-main">
        <input class="station-name" data-edit="${s.id}" value="${s.name.replace(/"/g,'&quot;')}" />
        <div class="station-times">
          <div class="time-pill"><span class="dot work"></span><input data-work="${s.id}" type="number" min="5" max="300" value="${s.work}">s</div>
          <div class="time-pill"><span class="dot rest"></span><input data-rest="${s.id}" type="number" min="0" max="300" value="${s.rest}">s</div>
        </div>
      </div>
      <div class="station-actions">
        <button class="icon-btn" data-up="${s.id}" aria-label="Move up">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"></polyline></svg>
        </button>
        <button class="icon-btn" data-down="${s.id}" aria-label="Move down">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <button class="icon-btn remove" data-del="${s.id}" aria-label="Remove station">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    `;
    list.appendChild(row);
  });

  list.querySelectorAll('[data-edit]').forEach(inp => inp.onchange = () => {
    const s = stations.find(s => s.id == inp.dataset.edit);
    s.name = inp.value.trim() || s.name;
    save();
  });
  list.querySelectorAll('[data-work]').forEach(inp => inp.onchange = () => {
    const s = stations.find(s => s.id == inp.dataset.work);
    s.work = parseInt(inp.value) || 0;
    save(); recalc();
  });
  list.querySelectorAll('[data-rest]').forEach(inp => inp.onchange = () => {
    const s = stations.find(s => s.id == inp.dataset.rest);
    s.rest = parseInt(inp.value) || 0;
    save(); recalc();
  });
  list.querySelectorAll('[data-del]').forEach(b => b.onclick = () => {
    stations = stations.filter(s => s.id != b.dataset.del);
    save(); render(); recalc();
  });
  list.querySelectorAll('[data-up]').forEach(b => b.onclick = () => {
    const i = stations.findIndex(s => s.id == b.dataset.up);
    if (i > 0) { [stations[i-1], stations[i]] = [stations[i], stations[i-1]]; save(); render(); }
  });
  list.querySelectorAll('[data-down]').forEach(b => b.onclick = () => {
    const i = stations.findIndex(s => s.id == b.dataset.down);
    if (i < stations.length - 1) { [stations[i+1], stations[i]] = [stations[i], stations[i+1]]; save(); render(); }
  });
}

$('addBtn').onclick = () => {
  const input = $('newStation');
  const name = input.value.trim();
  if (!name) return;
  stations.push({id: nextId++, name, work: 40, rest: 20});
  input.value = '';
  save(); render(); recalc();
};
$('newStation').addEventListener('keydown', e => { if (e.key === 'Enter') $('addBtn').click(); });

$('rounds').oninput = () => { recalc(); localStorage.setItem(profileKey(activeProfile,'rounds'), $('rounds').value); };
$('roundRest').oninput = () => { recalc(); localStorage.setItem(profileKey(activeProfile,'roundRest'), $('roundRest').value); };
$('circuitName').onchange = () => localStorage.setItem(profileKey(activeProfile,'name'), $('circuitName').value);

const savedName = localStorage.getItem(profileKey(activeProfile,'name'));
if (savedName) $('circuitName').value = savedName;
const savedRounds = localStorage.getItem(profileKey(activeProfile,'rounds'));
if (savedRounds) $('rounds').value = savedRounds;
const savedRoundRest = localStorage.getItem(profileKey(activeProfile,'roundRest'));
if (savedRoundRest) $('roundRest').value = savedRoundRest;

renderProfileSelect();
render();
recalc();

// ----- Run mode -----
const RADIUS = 100;
const CIRC = 2 * Math.PI * RADIUS;
const ring = $('ringProgress');
ring.style.strokeDasharray = CIRC;

let timerState = null; // { queue, idx, secLeft, paused, intervalId }

function buildQueue(){
  const rounds = parseInt($('rounds').value) || 1;
  const roundRest = parseInt($('roundRest').value) || 0;
  const queue = [];
  for (let r = 0; r < rounds; r++) {
    stations.forEach((s, si) => {
      queue.push({phase:'work', name:s.name, dur:s.work, round:r+1, totalRounds:rounds, stationIdx:si+1, totalStations:stations.length});
      if (s.rest > 0) queue.push({phase:'rest', name:s.name, dur:s.rest, round:r+1, totalRounds:rounds, stationIdx:si+1, totalStations:stations.length});
    });
    if (r < rounds - 1 && roundRest > 0) {
      queue.push({phase:'rest', name:'Round break', dur:roundRest, round:r+1, totalRounds:rounds, stationIdx:stations.length, totalStations:stations.length});
    }
  }
  return queue;
}

function setRingPhase(phase, fraction){
  ring.classList.toggle('work', phase === 'work');
  ring.classList.toggle('rest', phase === 'rest');
  ring.style.strokeDashoffset = CIRC * (1 - fraction);
}

function showStep(){
  const step = timerState.queue[timerState.idx];
  if (!step) { playFinish(); endRun(); return; }
  $('runPhaseLabel').textContent = step.phase === 'work' ? 'Work' : 'Rest';
  $('runPhaseLabel').className = 'run-phase-label ' + step.phase;
  $('runExerciseName').textContent = step.phase === 'work' ? step.name : (step.name === 'Round break' ? 'Round break' : 'Rest');
  $('runMeta').textContent = `Round ${step.round} of ${step.totalRounds} · Station ${step.stationIdx} of ${step.totalStations}`;
  timerState.secLeft = step.dur;
  $('ringTime').textContent = timerState.secLeft;
  setRingPhase(step.phase, 1);
  if (step.phase === 'work') playWorkStart(); else playRestStart();
}

function tick(){
  if (timerState.paused) return;
  timerState.secLeft--;
  if (timerState.secLeft < 0) {
    timerState.idx++;
    showStep();
    return;
  }
  $('ringTime').textContent = timerState.secLeft;
  const step = timerState.queue[timerState.idx];
  setRingPhase(step.phase, timerState.secLeft / step.dur);
  if (timerState.secLeft > 0 && timerState.secLeft <= 3) playCountdownTick();
}

$('runBtn').onclick = () => {
  if (!stations.length) return;
  if (soundOn) ensureAudioCtx();
  const queue = buildQueue();
  timerState = { queue, idx: 0, secLeft: 0, paused: false };
  $('runOverlay').classList.add('active');
  showStep();
  timerState.intervalId = setInterval(tick, 1000);
};

$('pauseBtn').onclick = () => {
  timerState.paused = !timerState.paused;
  $('pauseBtn').textContent = timerState.paused ? 'Resume' : 'Pause';
};

function endRun(){
  clearInterval(timerState.intervalId);
  $('runOverlay').classList.remove('active');
  $('pauseBtn').textContent = 'Pause';
  timerState = null;
}

// ----- Sound -----
let audioCtx = null;
let soundOn = localStorage.getItem('cb_sound_on') !== 'off';

function ensureAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function beep(freq, duration, type = 'sine', volume = 0.2, delay = 0){
  if (!soundOn) return;
  const ctx = ensureAudioCtx();
  const t0 = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t0);
  gain.gain.linearRampToValueAtTime(volume, t0 + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(t0);
  osc.stop(t0 + duration + 0.02);
}

function playCountdownTick(){ beep(880, 0.08, 'square', 0.15); }
function playWorkStart(){ beep(660, 0.18, 'sine', 0.22); beep(880, 0.18, 'sine', 0.18, 0.12); }
function playRestStart(){ beep(440, 0.22, 'sine', 0.2); }
function playFinish(){
  beep(523, 0.15, 'sine', 0.22, 0);
  beep(659, 0.15, 'sine', 0.22, 0.15);
  beep(784, 0.3, 'sine', 0.25, 0.3);
}

function updateMuteBtn(){
  $('muteBtn').textContent = soundOn ? '🔊 Sound' : '🔇 Muted';
}
$('muteBtn').onclick = () => {
  soundOn = !soundOn;
  localStorage.setItem('cb_sound_on', soundOn ? 'on' : 'off');
  updateMuteBtn();
  if (soundOn) ensureAudioCtx();
};
updateMuteBtn();

$('exitBtn').onclick = endRun;
</script>
